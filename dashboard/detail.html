<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Detail — Lingua</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>
  (function() {
    const saved = localStorage.getItem('lingua-theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1F1409;
    --bg-glow: radial-gradient(circle at 10% 0%, rgba(255,179,46,0.28), transparent 50%),
               radial-gradient(circle at 90% 15%, rgba(232,108,30,0.22), transparent 55%);
    --panel: #332309;
    --panel-raised: linear-gradient(165deg, #44300F 0%, #36260B 100%);
    --line: #5C4318;
    --paper: #FFF6E0;
    --paper-dim: #E8CD96;
    --text: #F7E8C4;
    --text-dim: #C7A464;
    --accent: #FFB22E;
    --accent-2: #FF7A1A;
    --accent-soft: rgba(255, 178, 46, 0.28);
    --accent-gradient: linear-gradient(135deg, #FFD166 0%, #FFB22E 50%, #FF7A1A 100%);
    --green: #8FCB7E;
    --red: #FF6B45;
    --sheen: rgba(255, 235, 190, 0.20);
    --shadow-panel: 0 1px 0 rgba(255,225,170,0.09) inset, 0 14px 36px -16px rgba(0,0,0,0.65);

    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  [data-theme="light"] {
    --bg: #FDF3DD;
    --bg-glow: radial-gradient(circle at 10% 0%, rgba(255,179,46,0.30), transparent 50%),
               radial-gradient(circle at 90% 10%, rgba(232,108,30,0.20), transparent 55%);
    --panel: #FFFCF4;
    --panel-raised: linear-gradient(165deg, #FFFFFF 0%, #FCEBC6 100%);
    --line: #EFD6A0;
    --paper: #3A2A14;
    --paper-dim: #7A5F39;
    --text: #4A3A22;
    --text-dim: #8C7350;
    --accent: #E8870F;
    --accent-2: #D4540F;
    --accent-soft: rgba(232, 135, 15, 0.20);
    --accent-gradient: linear-gradient(135deg, #FFB22E 0%, #E8870F 50%, #D4540F 100%);
    --green: #2E8F46;
    --red: #C9421F;
    --sheen: rgba(255, 255, 255, 0.8);
    --shadow-panel: 0 1px 0 rgba(255,255,255,0.9) inset, 0 14px 32px -18px rgba(120,90,40,0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image: var(--bg-glow);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 32px 80px;
    position: relative;
  }

  .theme-toggle {
    position: absolute;
    top: 44px;
    right: 32px;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    box-shadow: 0 1px 0 var(--sheen) inset;
    transition: all 0.2s ease;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .theme-toggle svg { width: 17px; height: 17px; }
  .theme-toggle .icon-moon { display: block; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 36px;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: var(--accent); }
  .back-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 18px;
  }

  .lang-pair-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    background: color-mix(in srgb, var(--accent-2) 16%, transparent);
    color: var(--accent-2);
    box-shadow: 0 1px 0 var(--sheen) inset;
  }

  .status-chip {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .status-chip.done { background: color-mix(in srgb, var(--green) 14%, transparent); color: var(--green); }
  .status-chip.failed { background: color-mix(in srgb, var(--red) 14%, transparent); color: var(--red); }
  .status-chip.processing { background: var(--accent-soft); color: var(--accent); }

  h1.video-title {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.35;
    color: var(--paper);
  }

  .video-url {
    display: block;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 40px;
    word-break: break-all;
  }
  .video-url a { color: var(--text-dim); text-decoration: none; }
  .video-url a:hover { color: var(--accent); text-decoration: underline; }

  .block {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-panel);
    position: relative;
    overflow: hidden;
  }
  .block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--sheen) 50%, transparent);
  }
  .block-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--paper);
  }
  .block-title .rule { flex: 1; height: 1px; background: var(--line); }

  .summary-text {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text);
  }

  .keypoints-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
  }
  .keypoint-item {
    display: flex;
    gap: 11px;
    align-items: baseline;
    font-size: 13.5px;
    color: var(--text);
  }
  .keypoint-item::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-gradient);
    box-shadow: 0 0 6px var(--accent-soft);
    flex-shrink: 0;
    transform: translateY(-2px);
  }

  .transcript-text {
    font-size: 13.5px;
    line-height: 1.95;
    color: var(--text-dim);
    white-space: pre-wrap;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .transcript-text::-webkit-scrollbar { width: 6px; }
  .transcript-text::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10.5px;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .loading-state, .error-state {
    text-align: center;
    padding: 90px 20px;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 17px;
  }
  .error-state { color: var(--red); }

  @media (max-width: 640px) {
    .wrap { padding: 32px 20px 60px; }
    .block { padding: 20px; }
    h1.video-title { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
    </svg>
  </button>

  <a href="index.html" class="back-link">&larr; Back to dashboard</a>

  <div id="content">
    <div class="loading-state">Loading details...</div>
  </div>

</div>

<script>
  const API_BASE = 'http://localhost:8000';

  const LANGUAGE_GLYPHS = {
    ar: 'ع', en: 'En', fr: 'Fr', es: 'Es', de: 'De', nl: 'Nl',
  };

  const STATUS_LABELS = {
    pending: 'Pending', downloading: 'Downloading', transcribing: 'Transcribing',
    summarizing: 'Summarizing', done: 'Done', failed: 'Failed',
  };

  function statusClass(status) {
    if (status === 'done') return 'done';
    if (status === 'failed') return 'failed';
    return 'processing';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getJobIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('job_id');
  }

  function copyTranscript() {
    const text = document.getElementById('transcriptText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const original = btn.textContent;
      btn.textContent = 'Copied ✓';
      setTimeout(() => { btn.textContent = original; }, 2000);
    });
  }

  function langPairChip(job) {
    const srcCode = job.detected_language;
    const tgtCode = job.summary_language;
    if (!srcCode && !tgtCode) return '';
    const srcLabel = srcCode ? (LANGUAGE_GLYPHS[srcCode] || srcCode.toUpperCase()) : '—';
    const tgtLabel = tgtCode ? (LANGUAGE_GLYPHS[tgtCode] || tgtCode.toUpperCase()) : '—';
    return `<span class="lang-pair-chip">${srcLabel} &rarr; ${tgtLabel}</span>`;
  }

  const RTL_LANGUAGES = new Set(['ar', 'he', 'fa', 'ur']);

  function textDirection(langCode, text) {
    if (langCode) {
      return RTL_LANGUAGES.has(langCode) ? 'rtl' : 'ltr';
    }
    if (text && /[\u0600-\u06FF]/.test(text)) {
      return 'rtl';
    }
    return 'ltr';
  }

  function renderContent(job) {
    const content = document.getElementById('content');
    const cls = statusClass(job.status);
    const label = STATUS_LABELS[job.status] || job.status;
    const title = job.video_title || 'Untitled';

    const titleDir = textDirection(job.detected_language, title);
    const transcriptDir = textDirection(job.detected_language, job.transcript);
    const summaryDir = textDirection(job.summary_language, job.summary);

    let metaTags = langPairChip(job);
    metaTags += `<span class="status-chip ${cls}">${label}</span>`;

    let body = `
      <div class="meta-row">${metaTags}</div>
      <h1 class="video-title" dir="${titleDir}">${escapeHtml(title)}</h1>
    `;

    if (job.youtube_url) {
      body += `<span class="video-url"><a href="${escapeHtml(job.youtube_url)}" target="_blank" rel="noopener">${escapeHtml(job.youtube_url)}</a></span>`;
    }

    if (job.status === 'failed') {
      body += `
        <div class="block">
          <div class="block-title">Error<div class="rule"></div></div>
          <div class="summary-text" style="color: var(--red);">${escapeHtml(job.error || 'An unexpected error occurred during processing.')}</div>
        </div>
      `;
    } else if (job.status !== 'done') {
      body += `
        <div class="block">
          <div class="summary-text">This analysis is still processing. Please check back shortly.</div>
        </div>
      `;
    } else {
      const keypointsHtml = (job.key_points || [])
        .map(p => `<div class="keypoint-item" dir="${summaryDir}">${escapeHtml(p)}</div>`)
        .join('');

      body += `
        <div class="block">
          <div class="block-title">Summary<div class="rule"></div></div>
          <div class="summary-text" dir="${summaryDir}">${escapeHtml(job.summary || '')}</div>
          ${keypointsHtml ? `<div class="keypoints-list">${keypointsHtml}</div>` : ''}
        </div>

        <div class="block">
          <div class="block-title">
            Full Transcript
            <div class="rule"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyTranscript()">Copy text</button>
          </div>
          <div class="transcript-text" id="transcriptText" dir="${transcriptDir}">${escapeHtml(job.transcript || 'No transcript available.')}</div>
        </div>
      `;
    }

    content.innerHTML = body;
  }

  async function loadJobDetail() {
    const jobId = getJobIdFromUrl();
    const content = document.getElementById('content');

    if (!jobId) {
      content.innerHTML = '<div class="error-state">No analysis specified. Please go back to the dashboard.</div>';
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/result/${jobId}`);

      if (res.status === 404) {
        content.innerHTML = '<div class="error-state">This analysis could not be found.</div>';
        return;
      }

      if (res.status === 409) {
        const statusRes = await fetch(`${API_BASE}/status/${jobId}`);
        const statusData = await statusRes.json();
        renderContent({ status: statusData.status, youtube_url: '', video_title: null });
        return;
      }

      if (!res.ok) throw new Error('Unknown error');

      const job = await res.json();
      renderContent(job);
    } catch (err) {
      content.innerHTML = '<div class="error-state">Could not connect to the server. Make sure it is running on port 8000.</div>';
    }
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('lingua-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('lingua-theme', 'light');
    }
  });

  loadJobDetail();
</script>
</body>
</html>
